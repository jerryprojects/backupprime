version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: primedb
      POSTGRES_USER: primeuser
      POSTGRES_PASSWORD: primepass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primeuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      DATABASE_URL: postgresql://primeuser:primepass123@db:5432/primedb
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000/api
    depends_on:
      - backend
    volumes:
      - ../src:/app/src
      - ../public:/app/public

volumes:
  postgres_data:
  static_volume:
  media_volume:
